<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS-Whisper | Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-wrapper">
        <header class="app-header">
            <div class="brand">
                <div class="brand-dot"></div>
                <h1>CS-WHISPER</h1>
            </div>
            <div class="status-indicator">
                <span class="status-dot online"></span> System Online
            </div>
        </header>

        <main class="workspace">
            <section class="input-section">
                
                <div class="panel upload-panel" id="drop-area">
                    <div class="panel-content">
                        <i class="fa-solid fa-arrow-up-from-bracket"></i>
                        <h3>Drop Audio File</h3>
                        <p class="meta-text">WAV, MP3, M4A up to 50MB</p>
                    </div>
                    <input type="file" id="fileElem" accept="audio/*" class="hidden">
                    <button class="ghost-btn" onclick="document.getElementById('fileElem').click()">Browse Files</button>
                </div>

                <div class="panel record-panel">
                    <div class="panel-content">
                        <canvas id="visualizer"></canvas>
                        <div class="record-ui" id="record-ui-default">
                            <i class="fa-solid fa-microphone-lines"></i>
                            <h3>Live Capture</h3>
                            <p class="meta-text">Record directly from browser</p>
                        </div>
                    </div>
                    <div class="record-controls">
                        <span id="time-display" class="time-display">00:00</span>
                        <button id="record-btn" class="record-btn">
                            <span class="rec-icon"></span> REC
                        </button>
                    </div>
                </div>

            </section>

            <div id="file-info" class="file-status hidden">
                <i class="fa-solid fa-file-audio"></i>
                <span id="file-name" class="mono-text">filename.wav</span>
                <button id="remove-file" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <button id="transcribe-btn" class="process-btn" disabled>
                INITIATE TRANSCRIPTION <i class="fa-solid fa-arrow-right"></i>
            </button>

            <div id="loading" class="loading-state hidden">
                <div class="cyber-loader"></div>
                <span>PROCESSING AUDIO DATA...</span>
            </div>

            <section id="result-section" class="output-section hidden">
                <div class="panel result-panel">
                    <div class="panel-header">
                        <h3>TRANSCRIPT OUTPUT</h3>
                        <button id="download-btn" class="ghost-btn small">
                            <i class="fa-solid fa-download"></i> Save .txt
                        </button>
                    </div>
                    <div class="transcript-content">
                        <p id="transcript-text"></p>
                    </div>
                </div>

                <div class="feedback-panel">
                    <span>Quality Assessment</span>
                    <div class="stars" id="star-rating">
                        <i class="fa-solid fa-star" data-value="1"></i>
                        <i class="fa-solid fa-star" data-value="2"></i>
                        <i class="fa-solid fa-star" data-value="3"></i>
                        <i class="fa-solid fa-star" data-value="4"></i>
                        <i class="fa-solid fa-star" data-value="5"></i>
                    </div>
                    <span id="rating-thanks" class="thanks-msg hidden">Feedback logged.</span>
                </div>
            </section>
        </main>
    </div>
    
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
